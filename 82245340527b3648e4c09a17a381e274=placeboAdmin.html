<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placebo | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="admin-card">
      <div id="loader" class="loading-overlay">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
      </div>

      <header>
        <i class="fas fa-pills"></i>
        <h1>Placebo</h1>
        <div class="status-badge">Upravljanje Plejlistom</div>
      </header>

      <div class="input-group">
        <label
          ><i class="fab fa-youtube"></i> YouTube Linkovi (jedan po redu)</label
        >
        <textarea
          id="links-input"
          placeholder="Zalepite linkove ovde..."
        ></textarea>
      </div>

      <button class="btn-primary" onclick="updatePlaylist()">
        <i class="fas fa-sync-alt"></i> SAČUVAJ IZMENE
      </button>

      <button
        class="btn-secondary"
        id="toggle-list-btn"
        onclick="toggleSongList()"
      >
        <i class="fas fa-list"></i> PRIKAŽI TRENUTNU LISTU PESAMA
      </button>

      <div id="song-list-container"></div>

      <div class="footer-info">
        <p>
          Sinhronizacija sa <span class="ok-brand">ok</span
          ><span class="radio-brand">radio</span> plejerom.
        </p>
        <span class="copyright"
          >&copy; 2026 OK Radio Smederevska Palanka. Sva prava zadržana.</span
        >
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://wnfvyylfinrghsrmhmlp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_l2-lCystkLYT6wzFY1D4Kg_X9KOU_vB";
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const CAFE_SLUG = "placebo"; // FIKSIRANO NA PLACEBO

      let currentPlaylistIds = [];

      async function loadPlaylist() {
        document.getElementById("loader").style.display = "flex";
        const { data, error } = await db
          .from("cafes")
          .select("playlist")
          .eq("slug", CAFE_SLUG)
          .single();
        if (!error && data) {
          currentPlaylistIds = data.playlist || [];
          document.getElementById("links-input").value = currentPlaylistIds
            .map((id) => `https://www.youtube.com/watch?v=${id}`)
            .join("\n");
        }
        document.getElementById("loader").style.display = "none";
      }

      function cleanMeta(title, author) {
        let artist = author.replace(" - Topic", "");
        let song = title;
        if (title.includes(" - ")) {
          const parts = title.split(" - ");
          artist = parts[0].trim();
          song = parts[1].trim();
        }
        return {
          artist,
          song: song.replace(/\(Official.*\)|\[Official.*\]/gi, "").trim(),
        };
      }

      async function renderSongNames() {
        const container = document.getElementById("song-list-container");
        container.innerHTML =
          '<p style="text-align:center; padding:15px; font-size:0.8rem; opacity:0.6;">Učitavam čiste nazive...</p>';

        if (currentPlaylistIds.length === 0) {
          container.innerHTML =
            '<p style="text-align:center; padding:15px;">Lista je prazna.</p>';
          return;
        }

        const promises = currentPlaylistIds.map(async (id) => {
          try {
            const res = await fetch(
              `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`,
            );
            const json = await res.json();
            const meta = cleanMeta(json.title, json.author_name);
            return `<b>${meta.artist}</b> - ${meta.song}`;
          } catch (e) {
            return `ID: ${id}`;
          }
        });

        const titles = await Promise.all(promises);
        container.innerHTML = titles
          .map(
            (t) =>
              `<div class="song-item"><i class="fas fa-music"></i><div class="song-info">${t}</div></div>`,
          )
          .join("");
      }

      function toggleSongList() {
        const container = document.getElementById("song-list-container");
        const btn = document.getElementById("toggle-list-btn");
        const isOpen = container.style.display === "block";
        container.style.display = isOpen ? "none" : "block";
        btn.innerHTML = isOpen
          ? '<i class="fas fa-list"></i> PRIKAŽI TRENUTNU LISTU PESAMA'
          : '<i class="fas fa-times"></i> SAKRIJ LISTU PESAMA';
        if (!isOpen) renderSongNames();
      }

      async function updatePlaylist() {
        const rawLinks = document.getElementById("links-input").value;
        const ids = rawLinks
          .split("\n")
          .map((l) => {
            const m = l.match(
              /(?:v=|\/v\/|youtu\.be\/|embed\/|youtu\.be\/)([^& \n?#]+)/,
            );
            return m ? m[1] : null;
          })
          .filter((id) => id !== null && id.trim() !== "");

        if (ids.length === 0) return alert("Unesite ispravne linkove!");

        const btn = document.querySelector(".btn-primary");
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ČUVANJE...';

        const { error } = await db
          .from("cafes")
          .update({ playlist: ids })
          .eq("slug", CAFE_SLUG);

        if (!error) {
          btn.style.background = "#fff";
          btn.innerHTML = '<i class="fas fa-check"></i> SAČUVAVANO';
          currentPlaylistIds = ids;
          setTimeout(() => {
            btn.style.background = "";
            btn.innerHTML = '<i class="fas fa-sync-alt"></i> SAČUVAJ IZMENE';
            btn.disabled = false;
            if (
              document.getElementById("song-list-container").style.display ===
              "block"
            )
              renderSongNames();
          }, 2000);
        } else {
          alert("Greška!");
          btn.disabled = false;
        }
      }

      window.onload = loadPlaylist;
    </script>
  </body>
</html>
