<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Sunce | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #89c753;
        --primary-dark: #76ac46;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.95);
        --text: #f1f5f9;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }
      body {
        background: radial-gradient(circle at top left, #1e293b, #0f172a);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      #auth-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .auth-box,
      .admin-card {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
        max-width: 500px;
      }
      .admin-card {
        display: none;
      }
      header {
        text-align: center;
        margin-bottom: 30px;
      }
      header i {
        font-size: 2.5rem;
        color: var(--primary);
        margin-bottom: 10px;
      }
      .section-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        color: var(--primary);
        letter-spacing: 1px;
        margin: 25px 0 15px 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      input[type="password"] {
        width: 100%;
        padding: 12px;
        margin: 20px 0;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #020617;
        color: #fff;
        text-align: center;
      }
      .btn {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        border: none;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      .btn-primary {
        background: var(--primary);
        color: #064e3b;
      }
      .upload-zone {
        padding: 20px;
        background: rgba(255, 255, 255, 0.03);
        border: 2px dashed rgba(137, 199, 83, 0.3);
        border-radius: 15px;
        text-align: center;
      }
      .preview-img {
        width: 100%;
        height: 160px;
        border-radius: 15px;
        object-fit: cover;
        margin-top: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: none;
      }
      #cafe-display-name {
        font-size: 1.8rem;
        color: #fff;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="auth-container">
      <div class="auth-box">
        <i
          class="fas fa-shield-alt"
          style="font-size: 2rem; color: var(--primary)"
        ></i>
        <h2 style="margin-top: 10px">Admin Panel</h2>
        <input
          type="password"
          id="pass-input"
          placeholder="Lozinka"
          onkeypress="if (event.key === 'Enter') checkPassword();"
        />
        <button class="btn btn-primary" onclick="checkPassword()">
          PRISTUPI
        </button>
      </div>
    </div>

    <div class="admin-card" id="main-panel">
      <header>
        <i class="fas fa-sun"></i>
        <div id="cafe-display-name">Cafe Sunce</div>
      </header>

      <div class="section-title">
        <i class="fas fa-image"></i> Pozadinska Slika
      </div>
      <div class="upload-zone">
        <input
          type="file"
          id="bg-upload"
          accept="image/*"
          style="display: none"
          onchange="uploadImage(this.files[0])"
        />
        <button
          class="btn"
          style="background: #334155; color: #fff"
          onclick="document.getElementById('bg-upload').click()"
        >
          PROMENI SLIKU
        </button>
        <img id="bg-preview" class="preview-img" />
        <div
          id="img-status"
          style="font-size: 0.8rem; margin-top: 10px; color: var(--primary)"
        ></div>
      </div>

      <div class="section-title">
        <i class="fas fa-music"></i> Slanje Muzike
      </div>
      <div class="upload-zone">
        <input
          type="file"
          id="music-upload"
          multiple
          accept=".mp3"
          style="display: none"
          onchange="handleFileUpload(this.files)"
        />
        <button
          class="btn btn-primary"
          onclick="document.getElementById('music-upload').click()"
        >
          DODAJ MP3 FAJLOVE
        </button>
        <div
          id="music-status"
          style="font-size: 0.8rem; margin-top: 10px; color: var(--primary)"
        ></div>
      </div>

      <div class="section-title">
        <i class="fas fa-list-ul"></i> Lista Pesama na Serveru
        <button
          onclick="fetchPlaylist()"
          style="
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            margin-left: 10px;
          "
        >
          <i class="fas fa-sync-alt"></i>
        </button>
      </div>

      <div
        id="playlist-container"
        class="upload-zone"
        style="text-align: left; max-height: 350px; overflow-y: auto"
      >
        <ul id="song-list" style="list-style: none; padding: 0">
          <li style="opacity: 0.5">Učitavam...</li>
        </ul>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://wnfvyylfinrghsrmhmlp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_l2-lCystkLYT6wzFY1D4Kg_X9KOU_vB";
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const CAFE_SLUG = "sunce";

      async function checkPassword() {
        const input = document.getElementById("pass-input").value;
        const { data } = await db
          .from("cafes")
          .select("*")
          .eq("slug", CAFE_SLUG)
          .single();
        if (data && data.password === input) {
          document.getElementById("auth-container").style.display = "none";
          document.getElementById("main-panel").style.display = "block";
          if (data.bg_url) {
            const img = document.getElementById("bg-preview");
            img.src = data.bg_url;
            img.style.display = "block";
          }
          fetchPlaylist();
        } else {
          alert("Pogrešna lozinka!");
        }
      }

      async function uploadImage(file) {
        if (!file) return;
        const status = document.getElementById("img-status");
        status.innerHTML = "⏳ Menjam sliku...";
        try {
          const fileName = `bg-${Date.now()}.jpg`;
          await db.storage
            .from("backgrounds")
            .upload(fileName, file, { upsert: true });
          const { data: urlData } = db.storage
            .from("backgrounds")
            .getPublicUrl(fileName);
          await db
            .from("cafes")
            .update({ bg_url: urlData.publicUrl })
            .eq("slug", CAFE_SLUG);
          document.getElementById("bg-preview").src = urlData.publicUrl;
          status.innerHTML = "✅ Slika sačuvana!";
        } catch (e) {
          status.innerHTML = "❌ Greška.";
        }
      }

      async function handleFileUpload(files) {
        if (!files.length) return;
        const status = document.getElementById("music-status");
        status.innerHTML = "🚀 Slanje na server...";
        const formData = new FormData();
        for (let f of files) {
          formData.append("files", f);
        }
        try {
          const res = await fetch("http://okradio.runasp.net/upload", {
            method: "POST",
            body: formData,
          });
          if (res.ok) {
            status.innerHTML = "✅ Uspešno!";
            fetchPlaylist();
          } else {
            status.innerHTML = "❌ Greška.";
          }
        } catch (e) {
          status.innerHTML = "❌ Backend nedostupan.";
        }
      }

      async function fetchPlaylist() {
        const list = document.getElementById("song-list");
        list.innerHTML = "⏳ Učitavam...";
        try {
          const res = await fetch("http://okradio.runasp.net/playlist");
          const songs = await res.json();
          list.innerHTML = "";
          songs.forEach((s, i) => {
            const li = document.createElement("li");
            li.style.padding = "10px";
            li.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
            li.innerHTML = `<strong>${i + 1}.</strong> ${s.name} <span style="opacity:0.5; font-size:0.7rem">(${(s.size / 1024 / 1024).toFixed(2)} MB)</span>`;
            list.appendChild(li);
          });
        } catch (e) {
          list.innerHTML = "❌ Greška pri učitavanju.";
        }
      }
    </script>
  </body>
</html>
