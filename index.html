<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Sunce | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #89c753;
        --primary-dark: #76ac46;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.95);
        --text: #f1f5f9;
        --accent: #2563eb;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }
      body {
        background: radial-gradient(circle at top left, #1e293b, #0f172a);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      #auth-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .auth-box,
      .admin-card {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
        max-width: 500px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      .admin-card {
        display: none;
      }
      header {
        text-align: center;
        margin-bottom: 30px;
      }
      header i {
        font-size: 2.5rem;
        color: var(--primary);
        margin-bottom: 10px;
      }
      .section-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        color: var(--primary);
        letter-spacing: 1px;
        margin: 25px 0 15px 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      input[type="password"] {
        width: 100%;
        padding: 12px;
        margin: 20px 0;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #020617;
        color: #fff;
        text-align: center;
      }
      .btn {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        border: none;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      .btn-primary {
        background: var(--primary);
        color: #064e3b;
      }
      .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }
      .upload-zone {
        padding: 20px;
        background: rgba(255, 255, 255, 0.03);
        border: 2px dashed rgba(137, 199, 83, 0.3);
        border-radius: 15px;
        text-align: center;
      }
      .preview-img {
        width: 100%;
        height: 160px;
        border-radius: 15px;
        object-fit: cover;
        margin-top: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: none;
      }
      .progress-container {
        display: none;
        margin-top: 10px;
        background: rgba(255, 255, 255, 0.05);
        height: 6px;
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-bar {
        width: 0%;
        height: 100%;
        background: var(--primary);
        transition: 0.3s;
      }
      #cafe-display-name {
        font-size: 1.8rem;
        color: #fff;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="auth-container">
      <div class="auth-box">
        <i class="fas fa-shield-alt"></i>
        <h2>Admin Panel</h2>
        <input
          type="password"
          id="pass-input"
          placeholder="Unesite lozinku"
          onkeypress="if (event.key === 'Enter') checkPassword();"
        />
        <button class="btn btn-primary" onclick="checkPassword()">
          PRISTUPI
        </button>
      </div>
    </div>

    <div class="admin-card" id="main-panel">
      <header>
        <i class="fas fa-sun"></i>
        <div id="cafe-display-name">Cafe Sunce</div>
      </header>

      <div class="section-title">
        <i class="fas fa-image"></i> Pozadinska Slika Plejera
      </div>
      <div class="upload-zone">
        <input
          type="file"
          id="bg-upload"
          accept="image/*"
          style="display: none"
          onchange="uploadImage(this.files[0])"
        />
        <button
          class="btn"
          style="background: #334155; color: #fff; margin-bottom: 10px"
          onclick="document.getElementById('bg-upload').click()"
        >
          <i class="fas fa-camera"></i> IZABERI NOVU SLIKU
        </button>
        <div id="preview-container" style="position: relative">
          <img
            id="bg-preview"
            class="preview-img"
            src=""
            style="display: none; margin: 0 auto"
          />
          <div
            id="img-loader"
            style="
              display: none;
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
            "
          >
            <i
              class="fas fa-spinner fa-spin"
              style="font-size: 2rem; color: var(--primary)"
            ></i>
          </div>
        </div>
        <div
          id="img-status"
          style="
            font-size: 0.85rem;
            margin-top: 10px;
            font-weight: bold;
            color: var(--primary);
          "
        ></div>
      </div>

      <div class="section-title">
        <i class="fas fa-music"></i> Slanje Muzike (.mp3)
      </div>
      <div class="upload-zone">
        <input
          type="file"
          id="music-upload"
          multiple
          accept=".mp3"
          style="display: none"
          onchange="handleFileUpload(this.files)"
        />
        <button
          class="btn btn-primary"
          onclick="document.getElementById('music-upload').click()"
        >
          <i class="fas fa-file-upload"></i> IZABERI PESME
        </button>
        <div id="upload-progress-container" class="progress-container">
          <div id="upload-bar" class="progress-bar"></div>
        </div>
        <div
          id="music-status"
          style="
            font-size: 0.85rem;
            margin-top: 10px;
            font-weight: bold;
            color: var(--primary);
          "
        ></div>
      </div>

      <div class="section-title">
        <i class="fas fa-list-ul"></i> Trenutna Lista Pesama
        <button
          onclick="fetchPlaylist()"
          style="
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            margin-left: 10px;
          "
        >
          <i class="fas fa-sync-alt"></i> Osveži
        </button>
      </div>

      <div
        id="playlist-container"
        class="upload-zone"
        style="text-align: left; max-height: 400px; overflow-y: auto"
      >
        <ul id="song-list" style="list-style: none; padding: 0">
          <li style="opacity: 0.5">Klikni "Osveži" da učitaš pesme...</li>
        </ul>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://wnfvyylfinrghsrmhmlp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_l2-lCystkLYT6wzFY1D4Kg_X9KOU_vB";
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const CAFE_SLUG = "sunce";

      async function checkPassword() {
        const input = document.getElementById("pass-input").value;
        const { data } = await db
          .from("cafes")
          .select("*")
          .eq("slug", CAFE_SLUG)
          .single();
        if (data && data.password === input) {
          document.getElementById("auth-container").style.display = "none";
          document.getElementById("main-panel").style.display = "block";
          if (data.bg_url) {
            const img = document.getElementById("bg-preview");
            img.src = data.bg_url;
            img.style.display = "block";
          }
          // AUTOMATSKO UCITAVANJE LISTE NAKON PRIJAVE
          fetchPlaylist();
        } else {
          alert("Pogrešna lozinka!");
        }
      }

      async function uploadImage(file) {
        if (!file) return;
        const imgElement = document.getElementById("bg-preview");
        const loader = document.getElementById("img-loader");
        const imgStatus = document.getElementById("img-status");

        imgElement.src = URL.createObjectURL(file);
        imgElement.style.display = "block";
        imgElement.style.opacity = "0.5";
        loader.style.display = "block";
        imgStatus.innerHTML = "⏳ Šaljem sliku na server...";

        try {
          const fileName = `bg-${Date.now()}.jpg`;
          const { error: uploadError } = await db.storage
            .from("backgrounds")
            .upload(fileName, file, { upsert: true });
          if (uploadError) throw uploadError;

          const { data: urlData } = db.storage
            .from("backgrounds")
            .getPublicUrl(fileName);
          const publicUrl = urlData.publicUrl;

          const { error: dbError } = await db
            .from("cafes")
            .update({ bg_url: publicUrl })
            .eq("slug", CAFE_SLUG);
          if (dbError) throw dbError;

          imgElement.style.opacity = "1";
          loader.style.display = "none";
          imgStatus.innerHTML = "✅ Slika je uspešno sačuvana!";
        } catch (error) {
          imgStatus.innerHTML = "❌ Greška: " + error.message;
          imgStatus.style.color = "#ff4444";
          loader.style.display = "none";
        }
      }

      async function handleFileUpload(files) {
        if (!files.length) return;
        const bar = document.getElementById("upload-bar");
        const musicStatus = document.getElementById("music-status");
        const container = document.getElementById("upload-progress-container");

        container.style.display = "block";
        bar.style.width = "0%";
        musicStatus.style.color = "var(--primary)";
        musicStatus.innerHTML = "🚀 Slanje pesama na Radio Server...";

        const formData = new FormData();
        for (let f of files) {
          formData.append("files", f);
        }

        try {
          const res = await fetch("https://okradio.runasp.net/upload", {
            method: "POST",
            body: formData,
          });

          if (res.ok) {
            bar.style.width = "100%";
            musicStatus.innerHTML = "✅ Uspešno! Pesme su ubačene.";
          } else {
            const err = await res.text();
            musicStatus.innerHTML = "❌ Greška: " + err;
            musicStatus.style.color = "#ff4444";
          }
        } catch (e) {
          musicStatus.innerHTML = "❌ Backend nije dostupan.";
          musicStatus.style.color = "#ff4444";
        }
      }

      async function fetchPlaylist() {
        const songList = document.getElementById("song-list");
        songList.innerHTML = "⏳ Učitavam listu pesama...";
        try {
          const response = await fetch("http://okradio.runasp.net/playlist");
          if (!response.ok) throw new Error("Backend greška.");
          const songs = await response.json();
          songList.innerHTML = "";
          if (songs.length === 0) {
            songList.innerHTML = "<li>Nema pesama na serveru.</li>";
            return;
          }
          songs.forEach((song, index) => {
            const li = document.createElement("li");
            li.style.padding = "12px";
            li.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
            li.style.display = "flex";
            li.style.justifyContent = "space-between";
            li.style.alignItems = "center";

            li.innerHTML = `
    <div>
      <strong>${index + 1}.</strong> ${song.name} 
      <span style="opacity:0.5; font-size:0.8rem; margin-left:10px;">(${(song.size / 1024 / 1024).toFixed(2)} MB)</span>
    </div>
    <button onclick="deleteSong('${song.name}')" style="background:none; border:none; color:#ff4444; cursor:pointer; padding:5px;">
      <i class="fas fa-trash-alt"></i>
    </button>
  `;
            songList.appendChild(li);
          });
        } catch (error) {
          songList.innerHTML =
            "<li style='color:#ff4444;'>❌ Greška pri učitavanju liste.</li>";
        }
      }
      async function deleteSong(fileName) {
        if (
          !confirm(
            `Da li ste sigurni da želite da obrišete pesmu: ${fileName}?`,
          )
        )
          return;

        const musicStatus = document.getElementById("music-status");
        musicStatus.innerHTML = "⏳ Brišem pesmu...";

        try {
          const response = await fetch(
            `http://okradio.runasp.net/playlist/${encodeURIComponent(fileName)}`,
            {
              method: "DELETE",
            },
          );

          if (response.ok) {
            musicStatus.innerHTML = "✅ Pesma uspešno obrisana.";
            fetchPlaylist(); // Osveži listu odmah
          } else {
            const err = await response.text();
            alert("Greška pri brisanju: " + err);
          }
        } catch (error) {
          console.error(error);
          alert("Backend nije dostupan.");
        }
      }
    </script>
  </body>
</html>
