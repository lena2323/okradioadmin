<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Sunce | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #89c753;
        --primary-hover: #76ac46;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.8);
        --text: #f1f5f9;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: radial-gradient(circle at top left, #1e293b, #0f172a);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      /* --- AUTH OVERLAY --- */
      #auth-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .auth-box {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 90%;
        max-width: 400px;
      }

      .auth-box input {
        width: 100%;
        padding: 12px;
        margin: 20px 0;
        border-radius: 8px;
        border: 1px solid #444;
        background: #000;
        color: #fff;
        text-align: center;
        font-size: 1.1rem;
      }

      /* --- MAIN CARD --- */
      .admin-card {
        display: none;
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
        max-width: 600px;
        padding: 40px;
        border-radius: 24px;
      }

      header {
        text-align: center;
        margin-bottom: 30px;
      }
      header i {
        font-size: 3rem;
        color: var(--primary);
        margin-bottom: 10px;
      }
      .status-badge {
        display: inline-block;
        background: rgba(137, 199, 83, 0.1);
        color: var(--primary);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
      }
      textarea {
        width: 100%;
        height: 200px;
        background: rgba(15, 23, 42, 0.6);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 15px;
        font-family: "Courier New", monospace;
        resize: none;
        outline: none;
        margin-top: 10px;
      }
      .btn-primary {
        width: 100%;
        margin-top: 25px;
        padding: 15px;
        background: var(--primary);
        color: #000;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        transition: 0.3s;
      }
      .btn-secondary {
        width: 100%;
        margin-top: 15px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        cursor: pointer;
      }
      #song-list-container {
        margin-top: 20px;
        max-height: 250px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        display: none;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .song-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.85rem;
      }
      .footer-info {
        margin-top: 30px;
        text-align: center;
        color: #94a3b8;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="auth-container">
      <div class="auth-box">
        <i
          class="fas fa-lock"
          style="font-size: 2rem; color: var(--primary)"
        ></i>
        <h2 style="margin-top: 15px">Admin Pristup</h2>
        <input
          type="password"
          id="pass-input"
          placeholder="Lozinka..."
          onkeypress="handleEnter(event)"
        />
        <button class="btn-primary" onclick="checkPassword()">PRISTUPI</button>
        <p
          id="error-msg"
          style="
            color: #ff4d4d;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
          "
        >
          Lozinka nije tačna!
        </p>
      </div>
    </div>

    <div class="admin-card" id="main-panel">
      <header>
        <i class="fas fa-sun"></i>
        <h1>Cafe Sunce</h1>
        <div class="status-badge">Upravljanje Plejlistom</div>
      </header>

      <div class="input-group">
        <label
          ><i class="fab fa-youtube"></i> Linkovi ili MP3 fajlovi (svaki u novom
          redu)</label
        >
        <textarea
          id="links-input"
          placeholder="https://youtube.com/...&#10;pesma.mp3"
        ></textarea>
      </div>

      <button class="btn-primary" onclick="updatePlaylist()">
        <i class="fas fa-sync-alt"></i> SAČUVAJ IZMENE
      </button>

      <button
        class="btn-secondary"
        id="toggle-list-btn"
        onclick="toggleSongList()"
      >
        <i class="fas fa-list"></i> PRIKAŽI TRENUTNU LISTU
      </button>

      <div id="song-list-container"></div>

      <div class="footer-info">
        <p>
          Sinhronizacija sa
          <span style="color: #fff; font-weight: bold">ok</span
          ><span style="color: var(--primary); font-weight: bold">radio</span>.
        </p>
        <span style="font-size: 0.75rem; opacity: 0.6"
          >&copy; 2026 OK Radio Smederevska Palanka.</span
        >
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://wnfvyylfinrghsrmhmlp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_l2-lCystkLYT6wzFY1D4Kg_X9KOU_vB";
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const CAFE_SLUG = "sunce";

      let authenticatedPassword = "";
      let currentPlaylistData = []; // Čuvamo niz objekata

      function handleEnter(e) {
        if (e.key === "Enter") checkPassword();
      }

      async function checkPassword() {
        const input = document.getElementById("pass-input").value;
        const errorMsg = document.getElementById("error-msg");

        console.log("Pokušaj prijave za:", CAFE_SLUG);

        // Dohvatamo lozinku i plejlistu za proveru
        const { data, error } = await db
          .from("cafes")
          .select("playlist, password")
          .eq("slug", CAFE_SLUG)
          .single();

        if (data && data.password === input) {
          console.log("Prijava uspešna!");
          authenticatedPassword = input;
          currentPlaylistData = data.playlist || [];

          document.getElementById("auth-container").style.display = "none";
          document.getElementById("main-panel").style.display = "block";

          renderLinksToTextarea(currentPlaylistData);
        } else {
          console.error("Neuspešna prijava ili greška:", error);
          errorMsg.style.display = "block";
          document.getElementById("pass-input").value = "";
        }
      }

      function renderLinksToTextarea(playlist) {
        if (!playlist || !Array.isArray(playlist)) return;

        const lines = playlist.map((item) => {
          if (item.type === "youtube")
            return `https://www.youtube.com/watch?v=${item.id}`;
          if (item.type === "mp3") return item.id; // npr. balkan.mp3
          return "";
        });

        document.getElementById("links-input").value = lines.join("\n");
      }

      async function updatePlaylist() {
        const rawInput = document.getElementById("links-input").value;
        const lines = rawInput.split("\n").filter((line) => line.trim() !== "");

        // Pravimo niz objekata za bazu
        const newPlaylist = lines
          .map((line) => {
            line = line.trim();
            const ytMatch = line.match(
              /(?:v=|\/v\/|youtu\.be\/|embed\/)([^& \n?#]+)/,
            );

            if (ytMatch) {
              return { type: "youtube", id: ytMatch[1] };
            } else if (line.toLowerCase().endsWith(".mp3")) {
              const cleanTitle = line.replace(".mp3", "").replace(/_/g, " ");
              return {
                type: "mp3",
                id: line,
                title: cleanTitle,
                artist: "Lokalni Fajl",
              };
            }
            return null;
          })
          .filter((item) => item !== null);

        const btn = document.querySelector("#main-panel .btn-primary");
        const originalHTML = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ČUVANJE...';

        const { error } = await db
          .from("cafes")
          .update({ playlist: newPlaylist })
          .eq("slug", CAFE_SLUG)
          .eq("password", authenticatedPassword);

        if (!error) {
          btn.style.background = "#fff";
          btn.innerHTML = '<i class="fas fa-check"></i> SAČUVAVANO!';
          currentPlaylistData = newPlaylist;

          setTimeout(() => {
            btn.disabled = false;
            btn.style.background = "";
            btn.innerHTML = originalHTML;
          }, 2000);

          if (
            document.getElementById("song-list-container").style.display ===
            "block"
          ) {
            renderSongNames();
          }
        } else {
          alert("Greška: " + error.message);
          btn.disabled = false;
          btn.innerHTML = originalHTML;
        }
      }

      function cleanMeta(title, author) {
        let artist = author.replace(" - Topic", "");
        let song = title;
        if (title.includes(" - ")) {
          const parts = title.split(" - ");
          artist = parts[0].trim();
          song = parts[1].trim();
        }
        return {
          artist,
          song: song.replace(/\(Official.*\)|\[Official.*\]/gi, "").trim(),
        };
      }

      async function renderSongNames() {
        const container = document.getElementById("song-list-container");
        container.innerHTML =
          '<p style="text-align:center; padding:10px; opacity:0.5;">Učitavam listu...</p>';

        const promises = currentPlaylistData.map(async (item) => {
          if (item.type === "youtube") {
            try {
              const res = await fetch(
                `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${item.id}&format=json`,
              );
              const json = await res.json();
              const meta = cleanMeta(json.title, json.author_name);
              return `<b>${meta.artist}</b> - ${meta.song}`;
            } catch (e) {
              return `YouTube: ${item.id}`;
            }
          } else {
            return `<i class="fas fa-file-audio"></i> ${item.title}`;
          }
        });

        const titles = await Promise.all(promises);
        container.innerHTML = titles
          .map(
            (t) =>
              `<div class="song-item"><i class="fas fa-music"></i><div class="song-info">${t}</div></div>`,
          )
          .join("");
      }

      function toggleSongList() {
        const container = document.getElementById("song-list-container");
        const isOpen = container.style.display === "block";
        container.style.display = isOpen ? "none" : "block";
        if (!isOpen) renderSongNames();
      }
    </script>
  </body>
</html>
