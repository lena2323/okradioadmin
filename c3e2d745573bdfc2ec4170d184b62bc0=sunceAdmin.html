<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Sunce | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #89c753;
        --primary-hover: #76ac46;
        --danger: #ff4d4d;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.8);
        --text: #f1f5f9;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }
      body {
        background: radial-gradient(circle at top left, #1e293b, #0f172a);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      #auth-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .auth-box {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 90%;
        max-width: 400px;
      }
      .auth-box input {
        width: 100%;
        padding: 12px;
        margin: 20px 0;
        border-radius: 8px;
        border: 1px solid #444;
        background: #000;
        color: #fff;
        text-align: center;
        font-size: 1.1rem;
      }

      .admin-card {
        display: none;
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
        max-width: 600px;
        padding: 40px;
        border-radius: 24px;
      }
      header {
        text-align: center;
        margin-bottom: 30px;
      }
      header i {
        font-size: 3rem;
        color: var(--primary);
        margin-bottom: 10px;
      }
      .status-badge {
        display: inline-block;
        background: rgba(137, 199, 83, 0.1);
        color: var(--primary);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
      }

      textarea {
        width: 100%;
        height: 120px;
        background: rgba(15, 23, 42, 0.6);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 15px;
        font-family: "Courier New", monospace;
        resize: none;
        outline: none;
        margin-top: 10px;
      }

      .btn-primary {
        width: 100%;
        margin-top: 25px;
        padding: 15px;
        background: var(--primary);
        color: #000;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        transition: 0.3s;
      }

      /* Multi-delete button */
      #mass-delete-btn {
        display: none;
        width: 100%;
        margin-top: 10px;
        padding: 12px;
        background: var(--danger);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      #song-list-container {
        margin-top: 20px;
        max-height: 350px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .song-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.2s;
        position: relative;
      }
      .song-item:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .song-left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        overflow: hidden;
      }

      /* Checkbox styling */
      .song-checkbox {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: var(--primary);
        opacity: 0.3; /* Skoro nevidljiv dok se ne hoveruje ili čekira */
        transition: opacity 0.2s;
      }
      .song-item:hover .song-checkbox,
      .song-checkbox:checked {
        opacity: 1;
      }

      .song-info {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.85rem;
        overflow: hidden;
      }
      .song-info i {
        color: var(--primary);
      }

      .delete-btn {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        padding: 8px;
        transition: 0.2s;
      }
      .delete-btn:hover {
        color: var(--danger);
        transform: scale(1.1);
      }

      .footer-info {
        margin-top: 30px;
        text-align: center;
        color: #94a3b8;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="auth-container">
      <div class="auth-box">
        <i
          class="fas fa-lock"
          style="font-size: 2rem; color: var(--primary)"
        ></i>
        <h2 style="margin-top: 15px">Admin Pristup</h2>
        <input
          type="password"
          id="pass-input"
          placeholder="Lozinka..."
          onkeypress="handleEnter(event)"
        />
        <button class="btn-primary" onclick="checkPassword()">PRISTUPI</button>
        <p
          id="error-msg"
          style="
            color: #ff4d4d;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
          "
        >
          Lozinka nije tačna!
        </p>
      </div>
    </div>

    <div class="admin-card" id="main-panel">
      <header>
        <i class="fas fa-sun"></i>
        <h1>Cafe Sunce</h1>
        <div class="status-badge">Upravljanje Plejlistom</div>
      </header>

      <div class="input-group">
        <label
          ><i class="fab fa-youtube"></i> Dodaj nove linkove ili MP3 (jedan po
          redu)</label
        >
        <textarea
          id="links-input"
          placeholder="Nalepi linkove ovde i klikni DODAJ..."
        ></textarea>
      </div>

      <button class="btn-primary" onclick="updatePlaylist()">
        <i class="fas fa-plus"></i> DODAJ NA LISTU
      </button>

      <h3
        style="
          margin-top: 30px;
          font-size: 1rem;
          opacity: 0.7;
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <span><i class="fas fa-list"></i> Trenutna Plejlista</span>
      </h3>

      <button id="mass-delete-btn" onclick="deleteSelectedSongs()">
        <i class="fas fa-trash-sweep"></i> OBRIŠI OZNAČENO (<span
          id="selected-count"
          >0</span
        >)
      </button>

      <div id="song-list-container"></div>

      <div class="footer-info">
        <p>
          Sinhronizacija sa
          <span style="color: #fff; font-weight: bold">ok</span
          ><span style="color: var(--primary); font-weight: bold">radio</span>.
        </p>
        <span style="font-size: 0.75rem; opacity: 0.6"
          >&copy; 2026 OK Radio Smederevska Palanka.</span
        >
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://wnfvyylfinrghsrmhmlp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_l2-lCystkLYT6wzFY1D4Kg_X9KOU_vB";
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const CAFE_SLUG = "sunce";

      let authenticatedPassword = "";
      let currentPlaylistData = [];

      function handleEnter(e) {
        if (e.key === "Enter") checkPassword();
      }

      async function checkPassword() {
        const input = document.getElementById("pass-input").value;
        const errorMsg = document.getElementById("error-msg");
        const { data, error } = await db
          .from("cafes")
          .select("playlist, password")
          .eq("slug", CAFE_SLUG)
          .single();

        if (data && data.password === input) {
          authenticatedPassword = input;
          currentPlaylistData = data.playlist || [];
          document.getElementById("auth-container").style.display = "none";
          document.getElementById("main-panel").style.display = "block";
          renderSongNames();
        } else {
          errorMsg.style.display = "block";
          document.getElementById("pass-input").value = "";
        }
      }

      // Funkcija koja prati koliko je pesama selektovano
      function updateSelectionUI() {
        const selected = document.querySelectorAll(".song-checkbox:checked");
        const massBtn = document.getElementById("mass-delete-btn");
        const countSpan = document.getElementById("selected-count");

        if (selected.length > 0) {
          massBtn.style.display = "block";
          countSpan.innerText = selected.length;
        } else {
          massBtn.style.display = "none";
        }
      }

      async function deleteSong(index) {
        if (!confirm("Da li ste sigurni da želite da obrišete ovu pesmu?"))
          return;
        currentPlaylistData.splice(index, 1);
        savePlaylistToDB();
      }

      async function deleteSelectedSongs() {
        const selectedCheckboxes = document.querySelectorAll(
          ".song-checkbox:checked",
        );
        if (
          !confirm(
            `Da li ste sigurni da želite da obrišete ${selectedCheckboxes.length} pesama?`,
          )
        )
          return;

        // Dobijamo indekse koje treba obrisati (od najvećeg ka najmanjem da ne poremetimo niz)
        const indicesToDelete = Array.from(selectedCheckboxes)
          .map((cb) => parseInt(cb.dataset.index))
          .sort((a, b) => b - a);

        indicesToDelete.forEach((index) => {
          currentPlaylistData.splice(index, 1);
        });

        savePlaylistToDB();
      }

      async function savePlaylistToDB() {
        const { error } = await db
          .from("cafes")
          .update({ playlist: currentPlaylistData })
          .eq("slug", CAFE_SLUG)
          .eq("password", authenticatedPassword);

        if (!error) {
          renderSongNames();
          updateSelectionUI();
        } else {
          alert("Greška pri čuvanju: " + error.message);
        }
      }

      async function updatePlaylist() {
        const textarea = document.getElementById("links-input");
        const rawInput = textarea.value;
        const lines = rawInput.split("\n").filter((line) => line.trim() !== "");

        if (lines.length === 0) return;

        const newEntries = lines
          .map((line) => {
            line = line.trim();
            const ytMatch = line.match(
              /(?:v=|\/v\/|youtu\.be\/|embed\/)([^& \n?#]+)/,
            );
            if (ytMatch) return { type: "youtube", id: ytMatch[1] };
            if (line.toLowerCase().endsWith(".mp3")) {
              return {
                type: "mp3",
                id: line,
                title: line.replace(".mp3", "").replace(/_/g, " "),
                artist: "Lokalni Fajl",
              };
            }
            return null;
          })
          .filter((item) => item !== null);

        currentPlaylistData = [...currentPlaylistData, ...newEntries];
        const btn = document.querySelector(".btn-primary");
        btn.disabled = true;

        const { error } = await db
          .from("cafes")
          .update({ playlist: currentPlaylistData })
          .eq("slug", CAFE_SLUG)
          .eq("password", authenticatedPassword);

        if (!error) {
          textarea.value = "";
          renderSongNames();
          setTimeout(() => {
            btn.disabled = false;
          }, 1000);
        }
      }

      function cleanMeta(title, author) {
        let artist = author.replace(" - Topic", "");
        let song = title;
        if (title.includes(" - ")) {
          const parts = title.split(" - ");
          artist = parts[0].trim();
          song = parts[1].trim();
        }
        return {
          artist,
          song: song.replace(/\(Official.*\)|\[Official.*\]/gi, "").trim(),
        };
      }

      async function renderSongNames() {
        const container = document.getElementById("song-list-container");
        container.innerHTML =
          '<p style="text-align:center; padding:20px; opacity:0.5;">Učitavam listu...</p>';

        const promises = currentPlaylistData.map(async (item, index) => {
          let displayName = "";
          if (item.type === "youtube") {
            try {
              const res = await fetch(
                `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${item.id}&format=json`,
              );
              const json = await res.json();
              const meta = cleanMeta(json.title, json.author_name);
              displayName = `<b>${meta.artist}</b> - ${meta.song}`;
            } catch (e) {
              displayName = `YouTube: ${item.id}`;
            }
          } else {
            displayName = `<i class="fas fa-file-audio"></i> ${item.title}`;
          }

          return `
            <div class="song-item">
              <div class="song-left">
                <input type="checkbox" class="song-checkbox" data-index="${index}" onchange="updateSelectionUI()">
                <div class="song-info">
                  <i class="fas fa-music"></i>
                  <span>${displayName}</span>
                </div>
              </div>
              <button class="delete-btn" onclick="deleteSong(${index})" title="Obriši">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>`;
        });

        const htmlItems = await Promise.all(promises);
        container.innerHTML =
          htmlItems.length > 0
            ? htmlItems.join("")
            : '<p style="text-align:center; padding:20px; opacity:0.5;">Lista je prazna.</p>';
        updateSelectionUI();
      }
    </script>
  </body>
</html>
