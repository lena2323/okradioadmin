<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Sunce | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="auth-container">
      <div class="auth-box">
        <i
          class="fas fa-lock"
          style="font-size: 2rem; color: var(--primary)"
        ></i>
        <h2 style="margin-top: 15px">Admin Pristup</h2>
        <input
          type="password"
          id="pass-input"
          placeholder="Lozinka..."
          onkeypress="handleEnter(event)"
        />
        <button class="btn-primary" onclick="checkPassword()">PRISTUPI</button>
        <p
          id="error-msg"
          style="
            color: #ff4d4d;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
          "
        >
          Lozinka nije tačna!
        </p>
      </div>
    </div>

    <div class="admin-card" id="main-panel">
      <header>
        <i class="fas fa-sun"></i>
        <h1>Cafe Sunce</h1>
        <div class="status-badge">Upravljanje Plejlistom</div>
      </header>

      <div class="input-group">
        <label
          ><i class="fab fa-youtube"></i> Dodaj nove linkove ili MP3 (jedan po
          redu)</label
        >
        <textarea
          id="links-input"
          placeholder="Nalepi nove linkove ovde..."
        ></textarea>
      </div>

      <button class="btn-primary" onclick="updatePlaylist()">
        <i class="fas fa-plus"></i> DODAJ NA LISTU
      </button>

      <h3 style="margin-top: 30px; font-size: 1rem; opacity: 0.7">
        <i class="fas fa-list"></i> Trenutna Plejlista
      </h3>
      <div id="song-list-container"></div>

      <div class="footer-info">
        <p>
          Sinhronizacija sa
          <span style="color: #fff; font-weight: bold">ok</span
          ><span style="color: var(--primary); font-weight: bold">radio</span>.
        </p>
        <span style="font-size: 0.75rem; opacity: 0.6"
          >&copy; 2026 OK Radio Smederevska Palanka.</span
        >
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://wnfvyylfinrghsrmhmlp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_l2-lCystkLYT6wzFY1D4Kg_X9KOU_vB";
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const CAFE_SLUG = "sunce";

      let authenticatedPassword = "";
      let currentPlaylistData = [];

      function handleEnter(e) {
        if (e.key === "Enter") checkPassword();
      }

      async function checkPassword() {
        const input = document.getElementById("pass-input").value;
        const errorMsg = document.getElementById("error-msg");

        const { data, error } = await db
          .from("cafes")
          .select("playlist, password")
          .eq("slug", CAFE_SLUG)
          .single();

        if (data && data.password === input) {
          authenticatedPassword = input;
          currentPlaylistData = data.playlist || [];
          document.getElementById("auth-container").style.display = "none";
          document.getElementById("main-panel").style.display = "block";
          renderSongNames();
        } else {
          errorMsg.style.display = "block";
          document.getElementById("pass-input").value = "";
        }
      }

      async function deleteSong(index) {
        if (!confirm("Da li ste sigurni da želite da obrišete ovu pesmu?"))
          return;

        // Ukloni pesmu iz lokalnog niza
        currentPlaylistData.splice(index, 1);

        // Odmah pošalji promenu u bazu
        const { error } = await db
          .from("cafes")
          .update({ playlist: currentPlaylistData })
          .eq("slug", CAFE_SLUG)
          .eq("password", authenticatedPassword);

        if (!error) {
          renderSongNames(); // Osveži UI
          renderLinksToTextarea(); // Osveži textarea
        } else {
          alert("Greška pri brisanju: " + error.message);
        }
      }

      function renderLinksToTextarea() {
        const lines = currentPlaylistData.map((item) => {
          if (item.type === "youtube")
            return `https://www.youtube.com/watch?v=${item.id}`;
          return item.id;
        });
        document.getElementById("links-input").value = lines.join("\n");
      }

      async function updatePlaylist() {
        const rawInput = document.getElementById("links-input").value;
        const lines = rawInput.split("\n").filter((line) => line.trim() !== "");

        const newEntries = lines
          .map((line) => {
            line = line.trim();
            const ytMatch = line.match(
              /(?:v=|\/v\/|youtu\.be\/|embed\/)([^& \n?#]+)/,
            );
            if (ytMatch) return { type: "youtube", id: ytMatch[1] };
            if (line.toLowerCase().endsWith(".mp3")) {
              return {
                type: "mp3",
                id: line,
                title: line.replace(".mp3", "").replace(/_/g, " "),
                artist: "Lokalni Fajl",
              };
            }
            return null;
          })
          .filter((item) => item !== null);

        // Spajamo staru listu sa novim unosima
        currentPlaylistData = [...currentPlaylistData, ...newEntries];

        const btn = document.querySelector(".btn-primary");
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ČUVANJE...';

        const { error } = await db
          .from("cafes")
          .update({ playlist: currentPlaylistData })
          .eq("slug", CAFE_SLUG)
          .eq("password", authenticatedPassword);

        if (!error) {
          btn.innerHTML = '<i class="fas fa-check"></i> USPEŠNO DODATO';
          document.getElementById("links-input").value = ""; // Isprazni textarea
          renderSongNames();
          setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-plus"></i> DODAJ NA LISTU';
          }, 2000);
        } else {
          alert("Greška: " + error.message);
          btn.disabled = false;
        }
      }

      function cleanMeta(title, author) {
        let artist = author.replace(" - Topic", "");
        let song = title;
        if (title.includes(" - ")) {
          const parts = title.split(" - ");
          artist = parts[0].trim();
          song = parts[1].trim();
        }
        return {
          artist,
          song: song.replace(/\(Official.*\)|\[Official.*\]/gi, "").trim(),
        };
      }

      async function renderSongNames() {
        const container = document.getElementById("song-list-container");
        container.innerHTML =
          '<p style="text-align:center; padding:20px; opacity:0.5;">Učitavam listu...</p>';

        const promises = currentPlaylistData.map(async (item, index) => {
          let displayName = "";
          if (item.type === "youtube") {
            try {
              const res = await fetch(
                `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${item.id}&format=json`,
              );
              const json = await res.json();
              const meta = cleanMeta(json.title, json.author_name);
              displayName = `<b>${meta.artist}</b> - ${meta.song}`;
            } catch (e) {
              displayName = `YouTube: ${item.id}`;
            }
          } else {
            displayName = `<i class="fas fa-file-audio"></i> ${item.title}`;
          }

          return `
            <div class="song-item">
              <div class="song-info">
                <i class="fas fa-music"></i>
                <span>${displayName}</span>
              </div>
              <button class="delete-btn" onclick="deleteSong(${index})" title="Obriši pesmu">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>`;
        });

        const htmlItems = await Promise.all(promises);
        container.innerHTML =
          htmlItems.length > 0
            ? htmlItems.join("")
            : '<p style="text-align:center; padding:20px; opacity:0.5;">Lista je prazna.</p>';
        renderLinksToTextarea();
      }
    </script>
  </body>
</html>
