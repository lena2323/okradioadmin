<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Sunce | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #89c753;
        --primary-hover: #76ac46;
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.8);
        --text: #f1f5f9;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: radial-gradient(circle at top left, #1e293b, #0f172a);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      /* --- AUTH OVERLAY --- */
      #auth-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .auth-box {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 90%;
        max-width: 400px;
      }

      .auth-box input {
        width: 100%;
        padding: 12px;
        margin: 20px 0;
        border-radius: 8px;
        border: 1px solid #444;
        background: #000;
        color: #fff;
        text-align: center;
        font-size: 1.1rem;
      }

      /* --- MAIN CARD (Hidden by default) --- */
      .admin-card {
        display: none; /* Skriveno dok se ne potvrdi lozinka */
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
        max-width: 600px;
        padding: 40px;
        border-radius: 24px;
      }

      /* Ostali stilovi ostaju isti kao u tvojim prethodnim fajlovima */
      header {
        text-align: center;
        margin-bottom: 30px;
      }
      header i {
        font-size: 3rem;
        color: var(--primary);
        margin-bottom: 10px;
      }
      .status-badge {
        display: inline-block;
        background: rgba(137, 199, 83, 0.1);
        color: var(--primary);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
      }
      textarea {
        width: 100%;
        height: 200px;
        background: rgba(15, 23, 42, 0.6);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 15px;
        font-family: "Courier New", monospace;
        resize: none;
        outline: none;
      }
      .btn-primary {
        width: 100%;
        margin-top: 25px;
        padding: 15px;
        background: var(--primary);
        color: #000;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        transition: 0.3s;
      }
      .btn-secondary {
        width: 100%;
        margin-top: 15px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        cursor: pointer;
      }
      #song-list-container {
        margin-top: 20px;
        max-height: 250px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        display: none;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .song-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.85rem;
      }
      .song-item i {
        color: var(--primary);
      }
      .footer-info {
        margin-top: 30px;
        text-align: center;
        color: #94a3b8;
        font-size: 0.9rem;
      }
      .ok-brand {
        color: #fff;
        font-weight: bold;
      }
      .radio-brand {
        color: var(--primary);
        font-weight: bold;
      }
      .copyright {
        display: block;
        margin-top: 10px;
        font-size: 0.75rem;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div id="auth-container">
      <div class="auth-box">
        <i
          class="fas fa-lock"
          style="font-size: 2rem; color: var(--primary)"
        ></i>
        <h2 style="margin-top: 15px">Admin Pristup</h2>
        <input
          type="password"
          id="pass-input"
          placeholder="Unesite lozinku..."
          onkeypress="handleEnter(event)"
        />
        <button class="btn-primary" onclick="checkPassword()">PRISTUPI</button>
        <p
          id="error-msg"
          style="
            color: #ff4d4d;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
          "
        >
          Lozinka nije tačna!
        </p>
      </div>
    </div>

    <div class="admin-card" id="main-panel">
      <header>
        <i class="fas fa-sun"></i>
        <h1>Cafe Sunce</h1>
        <div class="status-badge">Upravljanje Plejlistom</div>
      </header>

      <div class="input-group">
        <label><i class="fab fa-youtube"></i> YouTube Linkovi</label>
        <textarea id="links-input"></textarea>
      </div>

      <button class="btn-primary" onclick="updatePlaylist()">
        <i class="fas fa-sync-alt"></i> SAČUVAJ IZMENE
      </button>

      <button
        class="btn-secondary"
        id="toggle-list-btn"
        onclick="toggleSongList()"
      >
        <i class="fas fa-list"></i> PRIKAŽI TRENUTNU LISTU
      </button>

      <div id="song-list-container"></div>

      <div class="footer-info">
        <p>
          Sinhronizacija sa <span class="ok-brand">ok</span
          ><span class="radio-brand">radio</span> plejerom.
        </p>
        <span class="copyright">&copy; 2026 OK Radio Smederevska Palanka.</span>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://wnfvyylfinrghsrmhmlp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_l2-lCystkLYT6wzFY1D4Kg_X9KOU_vB";
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const CAFE_SLUG = "sunce";

      let authenticatedPassword = ""; // Čuvamo lozinku za update proveru

      function handleEnter(e) {
        if (e.key === "Enter") checkPassword();
      }

      async function checkPassword() {
        const input = document.getElementById("pass-input").value;
        const error = document.getElementById("error-msg");

        // Proveravamo bazu: tražimo red gde je slug 'sunce' i password se poklapa
        const { data, error: dbError } = await db
          .from("cafes")
          .select("playlist")
          .eq("slug", CAFE_SLUG)
          .eq("password", input)
          .single();

        if (data) {
          // Uspeh!
          authenticatedPassword = input;
          document.getElementById("auth-container").style.display = "none";
          document.getElementById("main-panel").style.display = "block";

          // Tek sada učitavamo linkove
          renderLinks(data.playlist);
        } else {
          error.style.display = "block";
          document.getElementById("pass-input").value = "";
        }
      }

      function renderLinks(ids) {
        if (!ids) return;
        document.getElementById("links-input").value = ids
          .map((id) => `https://www.youtube.com/watch?v=${id}`)
          .join("\n");
        // Sačuvamo ID-jeve za listu pesama
        window.currentPlaylistIds = ids;
      }

      async function updatePlaylist() {
        const rawLinks = document.getElementById("links-input").value;
        const ids = rawLinks
          .split("\n")
          .map((l) => {
            const m = l.match(
              /(?:v=|\/v\/|youtu\.be\/|embed\/|youtu\.be\/)([^& \n?#]+)/,
            );
            return m ? m[1] : null;
          })
          .filter((id) => id !== null);

        // Biramo dugme unutar main-panel-a da ne bi menjali dugme na login ekranu
        const btn = document.querySelector("#main-panel .btn-primary");
        const originalHTML = btn.innerHTML; // Čuvamo original (ikonica + tekst)

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ČUVANJE...';

        const { error } = await db
          .from("cafes")
          .update({ playlist: ids })
          .eq("slug", CAFE_SLUG)
          .eq("password", authenticatedPassword);

        if (!error) {
          btn.style.background = "#fff"; // Pobeli dugme za uspeh
          btn.innerHTML = '<i class="fas fa-check"></i> SAČUVANO!';

          setTimeout(() => {
            btn.disabled = false;
            btn.style.background = ""; // Vrati zelenu boju
            btn.innerHTML = originalHTML; // Vrati "SAČUVAJ IZMENE" sa ikonicom
          }, 2000);

          window.currentPlaylistIds = ids;

          // Ako je lista pesama otvorena, osveži i nju
          if (
            document.getElementById("song-list-container").style.display ===
            "block"
          ) {
            renderSongNames();
          }
        } else {
          alert("Greška pri čuvanju!");
          btn.disabled = false;
          btn.innerHTML = originalHTML;
        }
      }
      // --- Ostale funkcije za listu pesama (cleanMeta, toggleSongList, renderSongNames) ostaju iste ---
      function cleanMeta(title, author) {
        let artist = author.replace(" - Topic", "");
        let song = title;
        if (title.includes(" - ")) {
          const parts = title.split(" - ");
          artist = parts[0].trim();
          song = parts[1].trim();
        }
        return {
          artist,
          song: song.replace(/\(Official.*\)|\[Official.*\]/gi, "").trim(),
        };
      }

      async function renderSongNames() {
        const container = document.getElementById("song-list-container");
        container.innerHTML =
          '<p style="text-align:center; padding:10px; opacity:0.5;">Učitavam...</p>';
        const promises = window.currentPlaylistIds.map(async (id) => {
          try {
            const res = await fetch(
              `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`,
            );
            const json = await res.json();
            const meta = cleanMeta(json.title, json.author_name);
            return `<b>${meta.artist}</b> - ${meta.song}`;
          } catch (e) {
            return `ID: ${id}`;
          }
        });
        const titles = await Promise.all(promises);
        container.innerHTML = titles
          .map(
            (t) =>
              `<div class="song-item"><i class="fas fa-music"></i><div class="song-info">${t}</div></div>`,
          )
          .join("");
      }

      function toggleSongList() {
        const container = document.getElementById("song-list-container");
        const isOpen = container.style.display === "block";
        container.style.display = isOpen ? "none" : "block";
        if (!isOpen) renderSongNames();
      }
    </script>
  </body>
</html>
